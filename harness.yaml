# harness.yaml — project-local config (non-secret tunables only)
# Copy to harness.yaml in your project root and edit as needed.
# NEVER put secrets here. DATABASE_URL, GITHUB_TOKEN, OPENAI_API_KEY come from ENV.

project:
  name: efcore

repositories:
  - type: github
    name: dotnet/efcore
  # Second repo — contrasting ecosystem (Python), per-repo scope override.
  - type: github
    name: encode/httpx
    scope:
      mode: last_n
      value: 100

ingest:
  default_last_n: 100
  # Internal-sync account: produces "Merging internal commits for release/X"
  # PRs that the [bot]-suffix check cannot catch.
  stop_list:
    - vseanreesermsft
  # Recurring automation PRs (useless as retrieval precedents) whose authors
  # are not always bot-suffixed. Case-insensitive regexes over the PR title.
  title_stop_patterns:
    - 'source code updates from dotnet/dotnet'
    - 'update dependencies from'
    - 'merging internal commits'
    - '\[automated\]'

embed:
  model: text-embedding-3-small
  version: v1
  base_url: https://openrouter.ai/api/v1
  problem_limit_tokens: 1500
  diff_limit_tokens: 6000
  # Optional: route embeddings through any OpenAI-compatible endpoint.
  # Leave unset for OpenAI (api.openai.com). For OpenRouter, uncomment both
  # lines and set OPENAI_API_KEY to your OpenRouter key (sk-or-...).
  # The model MUST return 1536-dim vectors to match the skills schema.
  # base_url: https://openrouter.ai/api/v1
  # model: openai/text-embedding-3-small

search:
  top_n: 5
  score_threshold: 0.45
  problem_weight: 0.7
  solution_weight: 0.3
  oversample_factor: 5

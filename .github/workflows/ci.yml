name: CI

on:
  push:
    branches: [main]
  pull_request: {}

# Fork-PR-safe: read-only token, no secrets referenced anywhere in this file.
permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest tests/unit -q

  integration:
    # testcontainers provisions pgvector/pgvector:pg17 itself using the runner's
    # preinstalled Docker — no `services:` block and no secrets needed (the
    # integration + E2E suites run on the fake embedder with dummy credentials).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest tests -q

  gitleaks:
    # Server-side counterpart to .githooks/pre-commit — fails closed on a finding.
    # Runs the MIT-licensed gitleaks CLI directly (not gitleaks-action, which
    # requires a paid GITLEAKS_LICENSE secret on org-owned repos).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: Scan git history
        run: gitleaks git --redact --no-banner
